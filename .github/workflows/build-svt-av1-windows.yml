name: Build SVT-AV1 Windows x64

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Upstream SVT-AV1 tag, for example v4.1.0. Empty means latest release."
        required: false
        type: string
      force:
        description: "Rebuild and replace release assets if the GitHub release already exists."
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "17 2 * * *"

permissions:
  contents: write

concurrency:
  group: svt-av1-windows-${{ github.event.inputs.tag || 'latest' }}
  cancel-in-progress: false

jobs:
  resolve-release:
    name: Resolve upstream release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      source_url: ${{ steps.release.outputs.source_url }}
      should_build: ${{ steps.release.outputs.should_build }}
      release_exists: ${{ steps.release.outputs.release_exists }}
    steps:
      - name: Resolve target release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          FORCE: ${{ github.event.inputs.force }}
        run: |
          set -euo pipefail

          if [ -n "${INPUT_TAG:-}" ]; then
            tag="$INPUT_TAG"
          else
            tag="$(curl --fail --silent --show-error \
              'https://gitlab.com/api/v4/projects/AOMediaCodec%2FSVT-AV1/releases?order_by=released_at&sort=desc&per_page=1' \
              | jq -r '.[0].tag_name')"
          fi

          if [ -z "$tag" ] || [ "$tag" = "null" ]; then
            echo "Could not resolve an upstream SVT-AV1 release tag." >&2
            exit 1
          fi

          version="${tag#v}"
          source_url="https://gitlab.com/AOMediaCodec/SVT-AV1/-/tree/${tag}"
          release_exists=false
          should_build=true

          if gh release view "$tag" >/dev/null 2>&1; then
            release_exists=true
            if [ "${FORCE:-false}" != "true" ]; then
              should_build=false
            fi
          fi

          {
            echo "tag=$tag"
            echo "version=$version"
            echo "source_url=$source_url"
            echo "release_exists=$release_exists"
            echo "should_build=$should_build"
          } >> "$GITHUB_OUTPUT"

          echo "Upstream tag: $tag"
          echo "Version: $version"
          echo "Release exists: $release_exists"
          echo "Should build: $should_build"

  build-windows:
    name: Build Windows x64 package
    needs: resolve-release
    if: needs.resolve-release.outputs.should_build == 'true'
    runs-on: windows-2022
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout automation repository
        uses: actions/checkout@v4

      - name: Install NASM
        run: |
          choco install nasm -y --no-progress

          $nasm = Get-Command nasm -ErrorAction SilentlyContinue
          if ($null -eq $nasm) {
            $candidates = @(
              "${env:ProgramFiles}\NASM\nasm.exe",
              "${env:ProgramFiles(x86)}\NASM\nasm.exe",
              "C:\ProgramData\chocolatey\lib\nasm\tools\nasm.exe"
            )

            $nasmPath = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
            if ($null -eq $nasmPath) {
              $nasmPath = Get-ChildItem -Path "${env:ProgramFiles}", "C:\ProgramData\chocolatey\lib\nasm" -Filter nasm.exe -Recurse -ErrorAction SilentlyContinue |
                Select-Object -First 1 -ExpandProperty FullName
            }

            if ($null -eq $nasmPath) {
              Write-Error "NASM installed, but nasm.exe was not found."
            }

            $nasmDir = Split-Path $nasmPath -Parent
            Add-Content $env:GITHUB_PATH $nasmDir
            $env:Path = "$env:Path;$nasmDir"
          }

          nasm -v

      - name: Clone SVT-AV1 source
        env:
          TAG: ${{ needs.resolve-release.outputs.tag }}
        run: |
          git clone --branch $env:TAG --depth 1 https://gitlab.com/AOMediaCodec/SVT-AV1.git SVT-AV1
          git -C SVT-AV1 rev-parse HEAD | Tee-Object -FilePath svt-av1-commit.txt

      - name: Build SVT-AV1
        working-directory: SVT-AV1/Build/windows
        run: |
          ./build.bat 2022 release shared

      - name: Package binaries
        env:
          TAG: ${{ needs.resolve-release.outputs.tag }}
          VERSION: ${{ needs.resolve-release.outputs.version }}
          SOURCE_URL: ${{ needs.resolve-release.outputs.source_url }}
        run: |
          $ErrorActionPreference = "Stop"

          $binDir = Resolve-Path "SVT-AV1/Bin/Release"
          $app = Join-Path $binDir "SvtAv1EncApp.exe"
          if (!(Test-Path $app)) {
            Write-Error "Expected encoder executable was not found: $app"
          }

          $commit = (Get-Content svt-av1-commit.txt -Raw).Trim()
          $packageRoot = "artifacts/svt-av1-$env:VERSION-x64"
          New-Item -ItemType Directory -Force -Path $packageRoot | Out-Null
          Copy-Item "$binDir/*" $packageRoot -Recurse

          @(
            "SVT-AV1 Windows x64 build"
            "Upstream tag: $env:TAG"
            "Version: $env:VERSION"
            "Upstream commit: $commit"
            "Upstream source: $env:SOURCE_URL"
            "Build OS: windows-2022"
            "Build command: Build/windows/build.bat 2022 release shared"
            "Built at UTC: $((Get-Date).ToUniversalTime().ToString('yyyy-MM-ddTHH:mm:ssZ'))"
          ) | Set-Content -Encoding UTF8 "$packageRoot/BUILD_INFO.txt"

          Compress-Archive -Path "$packageRoot/*" -DestinationPath "svt-av1-$env:VERSION-x64.zip" -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: svt-av1-${{ needs.resolve-release.outputs.version }}-x64
          path: svt-av1-${{ needs.resolve-release.outputs.version }}-x64.zip
          if-no-files-found: error

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.resolve-release.outputs.tag }}
          VERSION: ${{ needs.resolve-release.outputs.version }}
          SOURCE_URL: ${{ needs.resolve-release.outputs.source_url }}
          RELEASE_EXISTS: ${{ needs.resolve-release.outputs.release_exists }}
        run: |
          $ErrorActionPreference = "Stop"

          $asset = "svt-av1-$env:VERSION-x64.zip"
          $notes = @"
          Automated Windows x64 build of upstream SVT-AV1 $env:VERSION.

          Upstream source: $env:SOURCE_URL

          Contents include the encoder sample executable, the shared SVT-AV1 library, related runtime files from Bin/Release, and BUILD_INFO.txt.
          "@

          if ($env:RELEASE_EXISTS -eq "true") {
            gh release upload $env:TAG $asset --clobber
          } else {
            gh release create $env:TAG $asset --title "SVT-AV1 $env:VERSION Windows x64" --notes $notes
          }

  already-built:
    name: Already built
    needs: resolve-release
    if: needs.resolve-release.outputs.should_build != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Report skipped build
        run: |
          echo "GitHub release ${{ needs.resolve-release.outputs.tag }} already exists. Use workflow_dispatch force=true to rebuild."
